<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Clinic Map Locator</title>
    <!-- CSS de Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Tus estilos -->
    <link rel="stylesheet" href="notes.css">
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #map-section {
            width: 100%;
            height: 100vh;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <!-- Contenedor único del mapa -->
    <div id="map-section">
        <div id="map"></div>
    </div>

    <!-- Script de Leaflet -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Tu lógica -->
    <script src="map.js"></script>
    <script>
        // Disparar la carga directamente al arrancar la página
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof loadData === 'function') {
                loadData();
            }
        });
    </script>
</body>
</html>
